name: Issue Resolved Comment

on:
  pull_request_target:
    types: [closed]
    branches: [main, develop]

jobs:
  comment-on-issues:
    name: Comment on resolved issues
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Comment on linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const text = `${pr.title}\n${pr.body || ''}`;

            // Pick up Closes / Fixes / Resolves style issue links
            const regex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
            const issueNumbers = [...new Set(
              [...text.matchAll(regex)].map((match) => Number(match[1]))
            )];

            if (issueNumbers.length === 0) {
              console.log('No linked issues found in this PR.');
              return;
            }

            for (const issueNumber of issueNumbers) {
              const body = [
                `✅ This issue was resolved by PR #${pr.number}.`,
                ``,
                `Thanks for reporting — the fix is now on \`main\`.`,
              ].join('\n');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }
